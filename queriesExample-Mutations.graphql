mutation {
  addPerson (
    name: "Karen"
    phone: "123-123-123"
    street: "Main Street, 1st"
    city: "Chicago"
  ) {
    name
    phone
    address{
      city
      street
    }
    id
  }
}

Response:
{
  "data": {
    "addPerson": {
      "name": "Karen",
      "phone": "123-123-123",
      "address": {
        "city": "Chicago",
        "street": "Main Street, 1st"
      },
      "id": "3866d465-c3fb-4678-bdd9-f751e7f394ea"
    }
  }
}

====== Enum type example ======

query {
  allPersons(phone: YES) {
    name
    phone
  }
}

Response:
{
  "data": {
    "allPersons": [
      {
        "name": "Josh",
        "phone": "123-456-7890"
      },
      {
        "name": "Bob",
        "phone": "555-555-5555"
      }
    ]
  }
}

======

query {
  allPersons(phone: NO) {
    name
    phone
  }
}

response:
{
  "data": {
    "allPersons": [
      {
        "name": "Alice",
        "phone": null
      }
    ]
  }
}

====== If no argument is provided, all persons are returned ======

query {
  allPersons {
    name
    phone
  }
}

Response:
{
  "data": {
    "allPersons": [
      {
        "name": "Josh",
        "phone": "123-456-7890"
      },
      {
        "name": "Alice",
        "phone": null
      },
      {
        "name": "Bob",
        "phone": "555-555-5555"
      }
    ]
  }
}

====== Mutation to edit a person's phone number ======

mutation {
  editNumber(name: "Alice", phone: "777-777-777") {
    name
    phone
    id
  }
}

Response:
{
  "data": {
    "editNumber": {
      "name": "Alice",
      "phone": "777-777-777",
      "id": "4e6f7g8h-2b3c-4d5e-9f0a-1b2c3d4e5f6g"
    }
  }
}

====== If the person to edit is not found, null is returned ======

mutation {
  editNumber(name: "XYZ", phone: "777-777-777") {
    name
    phone
    id
  }
}

Response:
{
  "data": {
    "editNumber": null
  }
}

