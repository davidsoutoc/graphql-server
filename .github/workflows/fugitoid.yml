name: Fugitoid (Code quality) 
on:
  workflow_dispatch:
    inputs:
      max_alerts_per_run:
        description: Maximum number of critical/high alerts to process
        required: true
        default: "1"
      dry_run:
        description: Set to true to simulate without creating branches or PRs
        required: true
        default: "false"
  schedule:
    - cron: "*/5 * * * *"
    
permissions:
  contents: write
  issues: write
  pull-requests: write
  security-events: write

concurrency:
  group: code-scanning-critical-high-autofix
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SHARED_LABELS: "CODE_QUALITY,MAINTENANCE"

jobs:
  create-code-scanning-autofix-prs:
    runs-on: ubuntu-latest
    outputs:
      created_pull_requests: ${{ steps.autofix.outputs.created_pull_requests }}
      created_pull_requests_count: ${{ steps.autofix.outputs.created_pull_requests_count }}
      dry_run: ${{ steps.autofix.outputs.dry_run }}
    env:
      MAX_ALERTS_PER_RUN: ${{ inputs.max_alerts_per_run || vars.MAX_ALERTS_PER_RUN || '1' }}
      DRY_RUN: ${{ inputs.dry_run || vars.DRY_RUN || 'false' }}
      BRANCH_PREFIX: ${{ vars.BRANCH_PREFIX || 'code-scanning-autofix' }}
      POLL_INTERVAL_MS: ${{ vars.POLL_INTERVAL_MS || '5000' }}
      POLL_TIMEOUT_MS: ${{ vars.POLL_TIMEOUT_MS || '180000' }}

    steps:
      - name: Validate security autofix token
        shell: bash
        run: |
          if [ -z "${{ secrets.SECURITY_AUTOFIX_TOKEN_PERSONAL }}" ]; then
            echo "SECURITY_AUTOFIX_TOKEN_PERSONAL secret is required for code scanning autofix workflows."
            echo "GITHUB_TOKEN is not sufficient for the code scanning autofix API in this workflow."
            exit 1
          fi

      - name: Create autofix pull requests for critical/high code scanning alerts
        id: autofix
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.SECURITY_AUTOFIX_TOKEN_PERSONAL }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const maxAlertsPerRun = Number.parseInt(process.env.MAX_ALERTS_PER_RUN ?? "1", 10);
            const dryRun = String(process.env.DRY_RUN ?? "false").toLowerCase() === "true";
            const branchPrefix = process.env.BRANCH_PREFIX ?? "code-scanning-autofix";
            const labels = String(process.env.SHARED_LABELS ?? "")
              .split(",")
              .map((value) => value.trim())
              .filter(Boolean);
            const pollIntervalMs = Number.parseInt(process.env.POLL_INTERVAL_MS ?? "5000", 10);
            const pollTimeoutMs = Number.parseInt(process.env.POLL_TIMEOUT_MS ?? "180000", 10);

            const headers = {
              "X-GitHub-Api-Version": "2026-03-10",
            };

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            async function api(method, url, params = {}) {
              return github.request(`${method} ${url}`, {
                owner,
                repo,
                headers,
                ...params,
              });
            }

            async function ensureBranch(branch, sha) {
              try {
                await api("GET", "/repos/{owner}/{repo}/git/ref/heads/{ref}", { ref: branch });
                core.info(`Branch ${branch} already exists`);
                return;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }

              await api("POST", "/repos/{owner}/{repo}/git/refs", {
                ref: `refs/heads/${branch}`,
                sha,
              });

              core.info(`Created branch ${branch}`);
            }

            async function pollAutofix(alertNumber) {
              const startedAt = Date.now();

              while (Date.now() - startedAt < pollTimeoutMs) {
                try {
                  const response = await api(
                    "GET",
                    "/repos/{owner}/{repo}/code-scanning/alerts/{alert_number}/autofix",
                    { alert_number: alertNumber },
                  );

                  const status = String(response.data?.status ?? "").toLowerCase();
                  core.info(`Alert #${alertNumber}: autofix status = ${status || "unknown"}`);

                  if (["success", "succeeded", "completed", "ready"].includes(status)) {
                    return response.data;
                  }

                  if (["failed", "failure", "error", "unsupported", "unavailable"].includes(status)) {
                    return response.data;
                  }
                } catch (error) {
                  if (error.status !== 404) {
                    throw error;
                  }

                  core.info(`Alert #${alertNumber}: autofix not visible yet, retrying`);
                }

                await sleep(pollIntervalMs);
              }

              return { status: "timeout" };
            }

            async function listAlertsBySeverity(severity) {
              const alerts = [];

              for (let page = 1; ; page += 1) {
                const response = await api("GET", "/repos/{owner}/{repo}/code-scanning/alerts", {
                  state: "open",
                  severity,
                  per_page: 100,
                  page,
                });

                alerts.push(...response.data);

                if (response.data.length < 100) {
                  break;
                }
              }

              alerts.sort((left, right) => {
                const leftUpdatedAt = Date.parse(left.updated_at || left.created_at || 0);
                const rightUpdatedAt = Date.parse(right.updated_at || right.created_at || 0);

                if (leftUpdatedAt !== rightUpdatedAt) {
                  return leftUpdatedAt - rightUpdatedAt;
                }

                return left.number - right.number;
              });

              return alerts;
            }

            const repoInfo = (await api("GET", "/repos/{owner}/{repo}")).data;
            const defaultBranch = repoInfo.default_branch;
            const defaultRef = (
              await api("GET", "/repos/{owner}/{repo}/git/ref/heads/{ref}", {
                ref: defaultBranch,
              })
            ).data;

            const baseSha = defaultRef.object.sha;

            const criticalAlerts = await listAlertsBySeverity("critical");
            const highAlerts = await listAlertsBySeverity("high");
            const alerts = [...criticalAlerts, ...highAlerts];
            const createdPullRequests = [];

            core.info(
              `Found ${criticalAlerts.length} critical and ${highAlerts.length} high open code scanning alerts in ${owner}/${repo}. Targeting up to ${maxAlertsPerRun} new autofix pull requests with critical alerts first.`,
            );

            for (const alert of alerts) {
              if (createdPullRequests.length >= maxAlertsPerRun) {
                core.info(`Reached max_alerts_per_run=${maxAlertsPerRun}. Stopping.`);
                break;
              }

              const alertNumber = alert.number;
              const severity = String(
                alert.rule?.security_severity_level
                ?? alert.rule?.severity
                ?? alert.most_recent_instance?.severity
                ?? "unknown",
              ).toLowerCase();
              const ruleId = alert.rule?.id || "unknown-rule";
              const branch = `${branchPrefix}/alert-${alertNumber}`;

              const existingPulls = (
                await api("GET", "/repos/{owner}/{repo}/pulls", {
                  state: "open",
                  head: `${owner}:${branch}`,
                  per_page: 1,
                })
              ).data;

              if (existingPulls.length > 0) {
                core.info(`Alert #${alertNumber}: PR already exists -> ${existingPulls[0].html_url}`);
                continue;
              }

              core.info(`Alert #${alertNumber}: requesting autofix`);
              try {
                await api("POST", "/repos/{owner}/{repo}/code-scanning/alerts/{alert_number}/autofix", {
                  alert_number: alertNumber,
                });
              } catch (error) {
                if (error.status === 422) {
                  core.warning(`Alert #${alertNumber}: autofix unavailable`);
                  continue;
                }
                throw error;
              }

              const autofix = await pollAutofix(alertNumber);
              const autofixStatus = String(autofix?.status ?? "").toLowerCase();

              if (!["success", "succeeded", "completed", "ready"].includes(autofixStatus)) {
                core.warning(`Alert #${alertNumber}: autofix finished with status ${autofixStatus || "unknown"}`);
                continue;
              }

              if (dryRun) {
                core.info(`Alert #${alertNumber}: dry_run=true, skipping branch, commit and PR creation`);
                createdPullRequests.push({
                  alert_number: alertNumber,
                  severity,
                  rule_id: ruleId,
                  alert_url: alert.html_url || `https://github.com/${owner}/${repo}/security/code-scanning/${alertNumber}`,
                  pull_request_number: null,
                  pull_request_url: null,
                  dry_run: true,
                });
                continue;
              }

              await ensureBranch(branch, baseSha);

              core.info(`Alert #${alertNumber}: committing autofix to ${branch}`);
              await api(
                "POST",
                "/repos/{owner}/{repo}/code-scanning/alerts/{alert_number}/autofix/commits",
                {
                  alert_number: alertNumber,
                  target_ref: `refs/heads/${branch}`,
                  message: `Apply autofix for code scanning alert #${alertNumber} (${ruleId})`,
                },
              );

              const pullRequest = (
                await api("POST", "/repos/{owner}/{repo}/pulls", {
                  title: `fix: code scanning alert #${alertNumber} (${ruleId})`,
                  head: branch,
                  base: defaultBranch,
                  maintainer_can_modify: true,
                  body: [
                    `Autofix for GitHub code scanning alert #${alertNumber}.`,
                    "",
                    `- Severity: ${severity}`,
                    `- Rule: \`${ruleId}\``,
                    `- Alert: ${alert.html_url || `https://github.com/${owner}/${repo}/security/code-scanning/${alertNumber}`}`,
                    `- Generated by: \`${context.workflow}\``,
                  ].join("\n"),
                })
              ).data;

              createdPullRequests.push({
                alert_number: alertNumber,
                severity,
                rule_id: ruleId,
                alert_url: alert.html_url || `https://github.com/${owner}/${repo}/security/code-scanning/${alertNumber}`,
                pull_request_number: pullRequest.number,
                pull_request_url: pullRequest.html_url,
                dry_run: false,
              });

              if (labels.length > 0) {
                try {
                  await api("POST", "/repos/{owner}/{repo}/issues/{issue_number}/labels", {
                    issue_number: pullRequest.number,
                    labels,
                  });
                } catch (error) {
                  if ([404, 422].includes(error.status)) {
                    core.warning(
                      `Alert #${alertNumber}: unable to apply labels ${labels.join(", ")} to PR #${pullRequest.number}`,
                    );
                  } else {
                    throw error;
                  }
                }
              }

              core.info(`Alert #${alertNumber}: created PR ${pullRequest.html_url}`);
            }

            core.setOutput("created_pull_requests", JSON.stringify(createdPullRequests));
            core.setOutput("created_pull_requests_count", String(createdPullRequests.length));
            core.setOutput("dry_run", String(dryRun));

  create-jira-tickets:
    needs: create-code-scanning-autofix-prs
    runs-on: ubuntu-latest
    if: ${{ needs.create-code-scanning-autofix-prs.outputs.created_pull_requests_count != '0' && needs.create-code-scanning-autofix-prs.outputs.dry_run != 'true' }}
    env:
      JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}
      JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
      JIRA_ISSUE_TYPE: ${{ vars.JIRA_ISSUE_TYPE || 'Task' }}
      CREATED_PULL_REQUESTS: ${{ needs.create-code-scanning-autofix-prs.outputs.created_pull_requests }}
      GITHUB_REPOSITORY_NAME: ${{ github.repository }}
      GITHUB_WORKFLOW_NAME: ${{ github.workflow }}
    steps:
      - name: Create Jira tickets for created autofix pull requests
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        with:
          script: |
            const createdPullRequests = JSON.parse(process.env.CREATED_PULL_REQUESTS ?? "[]");
            const jiraBaseUrl = process.env.JIRA_BASE_URL;
            const jiraProjectKey = process.env.JIRA_PROJECT_KEY;
            const jiraIssueType = process.env.JIRA_ISSUE_TYPE || "Task";
            const jiraLabels = String(process.env.SHARED_LABELS ?? "")
              .split(",")
              .map((value) => value.trim())
              .filter(Boolean);
            const jiraUserEmail = process.env.JIRA_USER_EMAIL;
            const jiraApiToken = process.env.JIRA_API_TOKEN;
            const repositoryName = process.env.GITHUB_REPOSITORY_NAME;
            const repositoryShortName = repositoryName.split("/").pop() || repositoryName;

            if (createdPullRequests.length === 0) {
              core.info("No pull requests were created. Skipping Jira ticket creation.");
              return;
            }

            if (!jiraBaseUrl || !jiraProjectKey || !jiraUserEmail || !jiraApiToken) {
              core.warning(
                "Jira ticket creation skipped because JIRA_BASE_URL, JIRA_PROJECT_KEY, JIRA_USER_EMAIL or JIRA_API_TOKEN is missing.",
              );
              return;
            }

            const authorization = Buffer.from(`${jiraUserEmail}:${jiraApiToken}`).toString("base64");

            async function createJiraIssue(entry) {
              const summary = `[${repositoryShortName}] Code scanning alert #${entry.alert_number} (${entry.severity}/${entry.rule_id})`;
              const severity = String(entry.severity ?? "").toLowerCase();
              const priorityName = severity === "critical"
                ? "Critical"
                : severity === "high"
                  ? "High"
                  : "Medium";
              const priority = { name: priorityName };
              const response = await fetch(`${jiraBaseUrl.replace(/\/$/, "")}/rest/api/3/issue`, {
                method: "POST",
                headers: {
                  "Authorization": `Basic ${authorization}`,
                  "Accept": "application/json",
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  fields: {
                    project: { key: jiraProjectKey },
                    summary,
                    issuetype: { name: jiraIssueType },
                    ...(priority ? { priority } : {}),
                    labels: jiraLabels,
                    description: {
                      type: "doc",
                      version: 1,
                      content: [
                        {
                          type: "paragraph",
                          content: [
                            { type: "text", text: `Repository: ${repositoryName}` },
                          ],
                        },
                        {
                          type: "paragraph",
                          content: [
                            { type: "text", text: `Severity: ${entry.severity}` },
                          ],
                        },
                        {
                          type: "paragraph",
                          content: [
                            { type: "text", text: `Rule: ${entry.rule_id}` },
                          ],
                        },
                        {
                          type: "paragraph",
                          content: [
                            { type: "text", text: "Alert: " },
                            {
                              type: "text",
                              text: entry.alert_url,
                              marks: [
                                {
                                  type: "link",
                                  attrs: {
                                    href: entry.alert_url,
                                  },
                                },
                              ],
                            },
                          ],
                        },
                        {
                          type: "paragraph",
                          content: [
                            { type: "text", text: "PR: " },
                            {
                              type: "text",
                              text: entry.pull_request_url,
                              marks: [
                                {
                                  type: "link",
                                  attrs: {
                                    href: entry.pull_request_url,
                                  },
                                },
                              ],
                            },
                          ],
                        },
                        {
                          type: "paragraph",
                          content: [
                            { type: "text", text: "Generated by: Fugitoid" },
                          ],
                        },
                      ],
                    },
                  },
                }),
              });

              if (!response.ok) {
                const responseText = await response.text();
                throw new Error(`Jira API returned ${response.status}: ${responseText}`);
              }

              const issue = await response.json();
              core.info(`Alert #${entry.alert_number}: created Jira issue ${issue.key}`);
            }

            for (const entry of createdPullRequests) {
              try {
                await createJiraIssue(entry);
              } catch (error) {
                core.warning(`Alert #${entry.alert_number}: Jira ticket creation failed: ${error.message}`);
              }
            }

  codex-pr-review:
    needs:
      - create-code-scanning-autofix-prs
      - create-jira-tickets
    runs-on: ubuntu-latest
    if: ${{ needs.create-code-scanning-autofix-prs.outputs.created_pull_requests_count != '0' && needs.create-code-scanning-autofix-prs.outputs.dry_run != 'true' }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        pull_request: ${{ fromJson(needs.create-code-scanning-autofix-prs.outputs.created_pull_requests) }}
    env:
      CODEX_REVIEW_MODEL: ${{ vars.CODEX_REVIEW_MODEL || 'gpt-5.4-mini' }}
      CODEX_REVIEW_EFFORT: ${{ vars.CODEX_REVIEW_EFFORT || 'low' }}
      CODEX_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_CODEX_REVIEW || secrets.OPENAI_API_KEY_DEPENDABOT_UPDATE }}
    steps:
      - name: Skip Codex review when API key is not configured
        if: ${{ env.CODEX_OPENAI_API_KEY == '' }}
        run: echo "OPENAI_API_KEY_CODEX_REVIEW or OPENAI_API_KEY_DEPENDABOT_UPDATE is required to run Codex PR review. Skipping."

      - name: Check out PR merge ref
        if: ${{ env.CODEX_OPENAI_API_KEY != '' }}
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ matrix.pull_request.pull_request_number }}/merge

      - name: Pre-fetch base and head refs for the PR
        if: ${{ env.CODEX_OPENAI_API_KEY != '' }}
        env:
          PR_BASE_REF: ${{ github.event.repository.default_branch }}
          PR_NUMBER: ${{ matrix.pull_request.pull_request_number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex PR review
        if: ${{ env.CODEX_OPENAI_API_KEY != '' }}
        id: run_codex
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ env.CODEX_OPENAI_API_KEY }}
          model: ${{ env.CODEX_REVIEW_MODEL }}
          effort: ${{ env.CODEX_REVIEW_EFFORT }}
          sandbox: read-only
          allow-bots: true
          allow-bot-users: github-actions[bot]
          prompt: |
            Review pull request #${{ matrix.pull_request.pull_request_number }} in ${{ github.repository }}.

            Review only the changes introduced by this pull request. Focus on:
            - correctness issues
            - security regressions
            - broken assumptions in the generated autofix
            - missing tests or validation where the change is risky

            Ignore style-only feedback and avoid broad refactors.

            Use these refs to understand the PR diff:
            - base branch: origin/${{ github.event.repository.default_branch }}
            - PR head ref: refs/pull/${{ matrix.pull_request.pull_request_number }}/head

            The PR was created by the "Code scanning critical/high autofix" workflow for alert #${{ matrix.pull_request.alert_number }}.

            Return concise review feedback in Markdown.
            If there are findings, list them ordered by severity and include file paths and line numbers when possible.
            If there are no meaningful findings, say exactly: No material findings.

      - name: Post Codex review comment
        if: ${{ env.CODEX_OPENAI_API_KEY != '' && steps.run_codex.outputs.final-message != '' }}
        uses: actions/github-script@v9
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
          PULL_REQUEST_NUMBER: ${{ matrix.pull_request.pull_request_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PULL_REQUEST_NUMBER),
              body: [
                "## Codex review",
                "",
                process.env.CODEX_FINAL_MESSAGE,
              ].join("\n"),
            });
